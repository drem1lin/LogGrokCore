name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. 1.0.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    env:
      VERSION: ${{ github.event.inputs.version || github.ref_name }}

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Install .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x

    - name: Determine version
      id: version
      shell: pwsh
      run: |
        $ver = "${{ env.VERSION }}" -replace '^v', ''
        if (-not $ver) { $ver = "1.0.0" }
        echo "RELEASE_VERSION=$ver" >> $env:GITHUB_OUTPUT
        echo "Version: $ver"

    - name: Restore
      run: dotnet restore

    - name: Run tests
      run: dotnet test --configuration Release --no-restore --verbosity normal

    - name: Publish self-contained (x64)
      run: |
        dotnet publish LogGrokCore/LogGrokCore.csproj `
          --configuration Release `
          --runtime win-x64 `
          --self-contained true `
          -p:PublishSingleFile=true `
          -p:IncludeNativeLibrariesForSelfExtract=true `
          -p:Version=${{ steps.version.outputs.RELEASE_VERSION }} `
          --output ./publish/selfcontained

    - name: Publish framework-dependent (x64)
      run: |
        dotnet publish LogGrokCore/LogGrokCore.csproj `
          --configuration Release `
          --runtime win-x64 `
          --self-contained false `
          -p:Version=${{ steps.version.outputs.RELEASE_VERSION }} `
          --output ./publish/fdd

    - name: Install Inno Setup
      shell: pwsh
      run: |
        choco install innosetup -y --no-progress
        echo "C:\Program Files (x86)\Inno Setup 6" >> $env:GITHUB_PATH

    - name: Build installer
      shell: pwsh
      run: |
        $version = "${{ steps.version.outputs.RELEASE_VERSION }}"
        
        # Copy published files to installer/publish
        New-Item -ItemType Directory -Force -Path ./installer/publish | Out-Null
        Copy-Item -Path ./publish/fdd/* -Destination ./installer/publish/ -Recurse
        
        # Build installer with Inno Setup
        & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" `
          /DMyAppVersion="$version" `
          /O"./artifacts" `
          "./installer/LogGrokCore.iss"

    - name: Create ZIP archives
      shell: pwsh
      run: |
        $version = "${{ steps.version.outputs.RELEASE_VERSION }}"
        Compress-Archive -Path ./publish/selfcontained/* -DestinationPath "./artifacts/LogGrokCore-$version-win-x64-selfcontained.zip"
        Compress-Archive -Path ./publish/fdd/* -DestinationPath "./artifacts/LogGrokCore-$version-win-x64-portable.zip"

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ env.VERSION }}
        name: LogGrokCore ${{ steps.version.outputs.RELEASE_VERSION }}
        draft: false
        prerelease: ${{ contains(env.VERSION, 'alpha') || contains(env.VERSION, 'beta') || contains(env.VERSION, 'rc') }}
        generate_release_notes: true
        files: |
          ./artifacts/LogGrokCore-${{ steps.version.outputs.RELEASE_VERSION }}-setup.exe
          ./artifacts/LogGrokCore-${{ steps.version.outputs.RELEASE_VERSION }}-win-x64-selfcontained.zip
          ./artifacts/LogGrokCore-${{ steps.version.outputs.RELEASE_VERSION }}-win-x64-portable.zip
        body: |
          ## Installation
          
          ### Installer (Recommended)
          Download `LogGrokCore-${{ steps.version.outputs.RELEASE_VERSION }}-setup.exe` and run it.
          - Creates Start Menu shortcut
          - Optional desktop shortcut
          - Optional .log/.txt file associations
          - Standard uninstaller via Add/Remove Programs
          
          ### Portable (Self-contained)
          Download `LogGrokCore-${{ steps.version.outputs.RELEASE_VERSION }}-win-x64-selfcontained.zip` — extract and run. No .NET runtime required.
          
          ### Portable (Framework-dependent)
          Download `LogGrokCore-${{ steps.version.outputs.RELEASE_VERSION }}-win-x64-portable.zip` — extract and run. Requires [.NET 10 runtime](https://dotnet.microsoft.com/download/dotnet/10.0).
          
          ## Requirements
          - Windows 10 or later (x64)

